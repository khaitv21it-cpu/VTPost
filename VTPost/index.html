<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel Post Pricing</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HERO -->
    <section class="hero-poster">
        <img src="image_3b78ab.jpg" class="full-poster">
    </section>


    <!-- CONTACT -->
    <!-- CONTACT -->
    <section class="contact-section">
        <h2 class="section-title">PLEASE CONTACT US FOR HELP</h2>

        <div class="single-contact-card">
            <div class="contact-card-content">
                <div class="contact-pill">Need help?</div>

                <h3>Contact Ms. Quynh</h3>

                <p>Zalo / Phone / Wechat:
                    <span class="copy-text phone-text">0394709832</span>
                </p>

                <p>Email:
                    <span class="copy-text email-text">quynhptq@os.viettel.com.vn</span>
                </p>
            </div>

            <div class="contact-actions">
                <a href="tel:0394709832" class="contact-btn primary">Call now</a>
                <a href="mailto:quynhptq@os.viettel.com.vn" class="contact-btn secondary">Send email</a>
            </div>
        </div>

        <div class="decoration-red-bar"></div>
    </section>

    <!-- PRICING -->
    <div class="main-wrapper">
        <h1 class="main-pricing-title" id="title">Đang tải bảng giá...</h1>
        <div id="dynamic-pricing"></div>
    </div>

    <!-- SCRIPT -->
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyDNUERHLfGjpxe3w644FK8VPEmKgYAWgYRvjgX954ZjJGXPoxu2cXB_5rEN0D-r_dg8A/exec";

        async function loadPricing() {
            const titleEl = document.getElementById('title');
            const container = document.getElementById('dynamic-pricing');

            try {
                const res = await fetch(API_URL);
                const json = await res.json();

                titleEl.textContent =
                    `BẢNG GIÁ ĐÃ BAO GỒM PHỤ PHÍ XĂNG DẦU VÀ VAT (${json.lastUpdated})`;

                const data = json.countries || [];
                container.innerHTML = '';

                for (let i = 0; i < data.length; i += 2) {
                    const row = document.createElement('div');
                    row.className = 'pricing-row';

                    row.appendChild(createCountry(data[i]));

                    if (i + 1 < data.length) {
                        const divider = document.createElement('div');
                        divider.className = 'divider';
                        divider.innerHTML =
                            '<div class="v-line"></div><div class="star">✦</div><div class="v-line"></div>';

                        row.appendChild(divider);
                        row.appendChild(createCountry(data[i + 1]));
                    }

                    container.appendChild(row);
                }
            } catch (err) {
                container.innerHTML = "<p style='color:red;text-align:center'>Lỗi tải dữ liệu</p>";
            }
        }

        function createCountry(c) {
            const el = document.createElement('div');
            el.className = 'country-block';

            const t1 = (c.prices1 || []).map(r =>
                `<tr><td>${r.w}</td><td>${r.p}</td></tr>`
            ).join('');

            const t2 = (c.prices2 || []).map(r => {
                const weight = parseFloat(r.w);
                const isRed = weight >= 21;

                return `
                    <tr class="${isRed ? 'highlight-red' : ''}">
                        <td>${r.w}</td>
                        <td>${r.p}</td>
                    </tr>
                `;
            }).join('');

            el.innerHTML = `
                <h2 class="country-title">${c.country}</h2>
                <div class="table-pair">
                    <table class="data-table">
                        <thead>
                            <tr><th>WEIGHT</th><th>PRICE</th></tr>
                        </thead>
                        <tbody>${t1}</tbody>
                    </table>

                    <table class="data-table">
                        <tbody>${t2}</tbody>
                    </table>
                </div>
            `;

            return el;
        }

        window.onload = loadPricing;
    </script>


    <div class="decoration-red-bar"></div>


    <div class="footer-gallery">
        <div class="gallery-item">
            <img src="gen-n-1.png" alt="Shipping 1">
        </div>
        <div class="gallery-item">
            <img src="gen-n-2.png" alt="Shipping 2">
        </div>
        <div class="gallery-item">
            <img src="gen-n-3.png" alt="Shipping 3">
        </div>
    </div>


</body>
</html>
